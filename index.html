<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Snake</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323:wght@400&display=swap');

:root {
  --bg: #0d1117;
  --panel: #161b22;
  --border: #30363d;
  --green: #3fb950;
  --green-glow: #3fb95066;
  --green-dim: #238636;
  --snake-head: #56d364;
  --snake-body: #3fb950;
  --food: #f78166;
  --food-glow: #f7816688;
  --text: #e6edf3;
  --muted: #8b949e;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  position: relative;
}

.logo {
  font-family: 'VT323', monospace;
  font-size: 2.8rem;
  color: var(--green);
  text-shadow: 0 0 20px var(--green-glow);
  letter-spacing: 3px;
}

.stats {
  display: flex;
  gap: 20px;
}

.stat {
  background: var(--panel);
  border: 1px solid var(--border);
  padding: 8px 14px;
  border-radius: 6px;
  text-align: center;
  min-width: 80px;
}

.stat span {
  display: block;
  font-size: 0.65rem;
  color: var(--muted);
}

.stat b {
  font-size: 1.6rem;
  color: var(--green);
  font-family: 'VT323';
}

canvas {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

/* OVERLAY */
.overlay {
  position: absolute;
  width: 420px;
  height: 420px;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: rgba(0,0,0,0.85);
  border-radius: 10px;
}

.overlay h1 {
  font-family: 'VT323';
  font-size: 3rem;
  color: var(--green);
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  background: var(--green-dim);
  border: 1px solid var(--green);
  color: white;
  cursor: pointer;
}

button:hover {
  background: var(--green);
}
</style>
</head>

<body>

<div class="container">
  <div class="logo">SNAKE</div>

  <div class="stats">
    <div class="stat"><span>Score</span><b id="score">0</b></div>
    <div class="stat"><span>Best</span><b id="best">0</b></div>
    <div class="stat"><span>Length</span><b id="len">1</b></div>
  </div>

  <div style="position:relative;">
    <canvas id="game" width="420" height="420"></canvas>

    <div class="overlay" id="overlay">
      <h1>GAME OVER</h1>
      <p id="final"></p>
      <button onclick="restart()">RETRY</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const SIZE = 21;
const CELL = 20;

let snake, dir, nextDir, food, score, best;
let ai = true;

best = localStorage.getItem("best") || 0;
document.getElementById("best").innerText = best;

/* INIT */
function init(){
  snake = [{x:10,y:10}];
  dir = {x:1,y:0};
  nextDir = {x:1,y:0};
  score = 0;
  food = spawn();
  document.getElementById("overlay").style.display="none";
  updateUI();
}

function spawn(){
  return {
    x: Math.floor(Math.random()*SIZE),
    y: Math.floor(Math.random()*SIZE)
  };
}

/* ===== INPUT ===== */
document.addEventListener("keydown", e=>{
  const k = e.key.toLowerCase();

  if((k==="w"||k==="arrowup") && dir.y!==1) nextDir={x:0,y:-1};
  if((k==="s"||k==="arrowdown") && dir.y!==-1) nextDir={x:0,y:1};
  if((k==="a"||k==="arrowleft") && dir.x!==1) nextDir={x:-1,y:0};
  if((k==="d"||k==="arrowright") && dir.x!==-1) nextDir={x:1,y:0};
});

/* ===== AI (SAFE BFS) ===== */
function bfs(){
  const queue = [snake[0]];
  const visited = new Set();
  const parent = new Map();

  const key = p=>p.x+","+p.y;
  visited.add(key(snake[0]));

  const dirs = [
    {x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}
  ];

  let end = null;

  while(queue.length){
    const cur = queue.shift();

    if(cur.x===food.x && cur.y===food.y){
      end = cur;
      break;
    }

    for(let d of dirs){
      const nx=cur.x+d.x;
      const ny=cur.y+d.y;

      if(nx<0||ny<0||nx>=SIZE||ny>=SIZE) continue;
      if(snake.some(s=>s.x===nx&&s.y===ny)) continue;

      const np={x:nx,y:ny};
      const k=key(np);

      if(visited.has(k)) continue;

      visited.add(k);
      parent.set(k,cur);
      queue.push(np);
    }
  }

  if(!end) return dir;

  let path=[];
  let cur=end;

  while(cur){
    path.push(cur);
    cur=parent.get(key(cur));
  }

  path.reverse();

  if(path.length>1){
    return {
      x:path[1].x-snake[0].x,
      y:path[1].y-snake[0].y
    };
  }

  return dir;
}

/* ===== UPDATE ===== */
function update(){
  if(ai) dir = bfs();
  else dir = nextDir;

  const head = {
    x:snake[0].x+dir.x,
    y:snake[0].y+dir.y
  };

  if(head.x<0||head.y<0||head.x>=SIZE||head.y>=SIZE)
    return gameOver();

  if(snake.some(s=>s.x===head.x&&s.y===head.y))
    return gameOver();

  snake.unshift(head);

  if(head.x===food.x&&head.y===food.y){
    score++;
    food=spawn();
  } else {
    snake.pop();
  }

  updateUI();
}

/* ===== RENDER (SMOOTH) ===== */
function draw(){
  ctx.clearRect(0,0,420,420);

  // food
  ctx.fillStyle="#f78166";
  ctx.beginPath();
  ctx.arc(food.x*CELL+10,food.y*CELL+10,7,0,Math.PI*2);
  ctx.fill();

  // snake
  snake.forEach((s,i)=>{
    ctx.fillStyle = i===0 ? "#56d364" : "#3fb950";
    ctx.beginPath();
    ctx.arc(s.x*CELL+10,s.y*CELL+10,8,0,Math.PI*2);
    ctx.fill();
  });
}

/* ===== LOOP (60fps smooth + fixed logic) ===== */
let last=0,acc=0;
const STEP=120;

function loop(t){
  requestAnimationFrame(loop);

  if(!last) last=t;
  acc+=t-last;
  last=t;

  while(acc>STEP){
    update();
    acc-=STEP;
  }

  draw();
}

/* ===== GAME OVER ===== */
function gameOver(){
  document.getElementById("overlay").style.display="flex";
  document.getElementById("final").innerText="Score: "+score;

  if(score>best){
    best=score;
    localStorage.setItem("best",best);
  }

  document.getElementById("best").innerText=best;
}

/* ===== UI ===== */
function updateUI(){
  document.getElementById("score").innerText=score;
  document.getElementById("len").innerText=snake.length;
}

/* ===== RESTART ===== */
function restart(){
  init();
}

init();
requestAnimationFrame(loop);
</script>

</body>
</html>
