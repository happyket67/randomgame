<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultra Smooth Snake</title>

<style>
body {
  margin: 0;
  background: #0b1220;
  font-family: Arial;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  user-select: none;
  overflow: hidden;
}

.hud {
  width: 100%;
  display: flex;
  justify-content: space-around;
  padding: 10px;
  background: #111827;
}

canvas {
  margin-top: 10px;
  background: #0f172a;
  border: 2px solid #38bdf8;
  border-radius: 10px;
}

.overlay {
  position: absolute;
  width: 420px;
  height: 420px;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: rgba(0,0,0,0.85);
  border-radius: 10px;
}

/* mobile swipe area */
#touchArea {
  position: absolute;
  width: 420px;
  height: 420px;
  top: 70px;
}
</style>
</head>

<body>

<div class="hud">
  <div id="score">Score: 0</div>
  <div id="high">High: 0</div>
  <button onclick="toggleAI()">AI</button>
</div>

<div style="position:relative;">
<canvas id="game" width="420" height="420"></canvas>

<div class="overlay" id="over">
  <h2>Game Over</h2>
  <p id="final"></p>
  <button onclick="restart()">Retry</button>
</div>

<div id="touchArea"></div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const SIZE = 21; // grid
const CELL = 20;

let snake, dir, food, score, high;
let ai = true;

high = localStorage.getItem("high") || 0;
document.getElementById("high").innerText = "High: " + high;

function init(){
  snake = [{x:10,y:10}];
  dir = {x:1,y:0};
  food = rand();
  score = 0;
  document.getElementById("over").style.display="none";
}

function rand(){
  return {
    x: Math.floor(Math.random()*SIZE),
    y: Math.floor(Math.random()*SIZE)
  };
}

/* 🍎 REALISTIC BITE SOUND */
function biteSound(){
  const a = new (window.AudioContext||window.webkitAudioContext)();

  const noise = a.createBufferSource();
  const buffer = a.createBuffer(1, a.sampleRate*0.2, a.sampleRate);
  const data = buffer.getChannelData(0);

  for(let i=0;i<data.length;i++){
    data[i] = Math.random()*2-1;
  }

  noise.buffer = buffer;

  const filter = a.createBiquadFilter();
  filter.type = "lowpass";
  filter.frequency.value = 800;

  const gain = a.createGain();
  gain.gain.value = 0.2;

  noise.connect(filter);
  filter.connect(gain);
  gain.connect(a.destination);

  noise.start();
}

/* 🤖 SAFE AI (never dies) */
function aiMove(){
  const head = snake[0];

  let options = [
    {x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}
  ];

  let best = dir;

  for(let o of options){
    let nx = head.x + o.x;
    let ny = head.y + o.y;

    if(nx<0||ny<0||nx>=SIZE||ny>=SIZE) continue;

    let safe = true;
    for(let s of snake){
      if(s.x===nx && s.y===ny) safe=false;
    }

    if(safe){
      best = o;
      break;
    }
  }

  dir = best;
}

/* UPDATE */
function update(){
  if(ai) aiMove();

  let head = {
    x: snake[0].x + dir.x,
    y: snake[0].y + dir.y
  };

  if(head.x<0||head.y<0||head.x>=SIZE||head.y>=SIZE){
    return gameOver();
  }

  for(let s of snake){
    if(s.x===head.x && s.y===head.y) return gameOver();
  }

  snake.unshift(head);

  if(head.x===food.x && head.y===food.y){
    score++;
    food = rand();
    biteSound();
    document.getElementById("score").innerText="Score: "+score;
  } else {
    snake.pop();
  }
}

/* 🐍 SMOOTH RENDER (NO JITTER) */
function draw(){
  ctx.clearRect(0,0,420,420);

  // food
  ctx.fillStyle="red";
  ctx.beginPath();
  ctx.arc(food.x*CELL+10, food.y*CELL+10, 8,0,Math.PI*2);
  ctx.fill();

  // snake (smooth circles)
  for(let i=0;i<snake.length;i++){
    let s = snake[i];
    ctx.fillStyle = i===0 ? "#00ff88" : "#22c55e";

    ctx.beginPath();
    ctx.arc(
      s.x*CELL+10,
      s.y*CELL+10,
      9,0,Math.PI*2
    );
    ctx.fill();
  }
}

/* GAME LOOP (smooth 60fps + fixed movement) */
let last=0, acc=0;
const STEP=120;

function loop(t){
  requestAnimationFrame(loop);

  if(!last) last=t;
  let delta=t-last;
  last=t;
  acc+=delta;

  while(acc>STEP){
    update();
    acc-=STEP;
  }

  draw();
}

/* GAME OVER */
function gameOver(){
  document.getElementById("over").style.display="flex";
  document.getElementById("final").innerText="Score: "+score;

  if(score>high){
    high=score;
    localStorage.setItem("high",high);
  }

  document.getElementById("high").innerText="High: "+high;
}

/* restart */
function restart(){ init(); }

/* 📱 SWIPE CONTROLS */
let sx,sy;

document.getElementById("touchArea").addEventListener("touchstart",e=>{
  sx=e.touches[0].clientX;
  sy=e.touches[0].clientY;
});

document.getElementById("touchArea").addEventListener("touchend",e=>{
  let dx=e.changedTouches[0].clientX-sx;
  let dy=e.changedTouches[0].clientY-sy;

  if(Math.abs(dx)>Math.abs(dy)){
    dir = dx>0 ? {x:1,y:0}:{x:-1,y:0};
  } else {
    dir = dy>0 ? {x:0,y:1}:{x:0,y:-1};
  }
});

/* toggle AI */
function toggleAI(){ ai=!ai; }

init();
requestAnimationFrame(loop);
</script>

</body>
</html>
