<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Camera</title>
    <style>
        :root {
            --ios-yellow: #ffcc00;
            --ios-red: #ff3b30;
            --ios-blue: #007aff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; background: #000; color: white;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            height: 100vh; display: flex; flex-direction: column;
            overflow: hidden; user-select: none;
        }

        /* Top Bar Fixes */
        .top-bar {
            height: 60px; display: flex; justify-content: space-between;
            align-items: center; padding: 0 25px; z-index: 10;
        }
        .top-icon { cursor: pointer; transition: opacity 0.2s; }
        .top-icon:active { opacity: 0.5; }

        #camera-wrapper {
            position: relative; flex-grow: 1;
            width: 100%; overflow: hidden;
            background: #000;
        }

        video { 
            width: 100%; height: 100%; object-fit: cover; 
            background: #000;
        }

        /* Portrait Blur Effect */
        body.portrait-active video { filter: saturate(1.1) contrast(1.1); }
        .portrait-overlay {
            position: absolute; inset: 0; pointer-events: none;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.5);
            display: none;
        }
        body.portrait-active .portrait-overlay { display: block; }

        #focus-square {
            position: absolute; width: 65px; height: 65px;
            border: 1px solid var(--ios-yellow); display: none;
            pointer-events: none;
        }

        /* Bottom UI */
        .bottom-ui { background: black; padding-bottom: 30px; }
        
        .mode-container {
            width: 100%; overflow: hidden; padding: 15px 0;
            display: flex; justify-content: center;
        }
        .mode-list { display: flex; gap: 20px; font-size: 13px; font-weight: 700; }
        .mode { color: #999; cursor: pointer; }
        .mode.active { color: var(--ios-yellow); }

        .shutter-row {
            width: 100%; display: flex; justify-content: space-around; align-items: center;
        }

        .thumb-link {
            width: 48px; height: 48px; border-radius: 50%;
            background: #333; overflow: hidden; border: none; padding: 0;
        }
        .thumb-link img { width: 100%; height: 100%; object-fit: cover; }

        .shutter-btn {
            width: 78px; height: 78px; border-radius: 50%;
            border: 4px solid white; display: flex; align-items: center; justify-content: center;
        }
        .shutter-inner {
            width: 62px; height: 62px; border-radius: 50%;
            background: white; transition: all 0.2s ease;
        }
        .video-active .shutter-inner { background: var(--ios-red); }
        .recording .shutter-inner { border-radius: 10px; transform: scale(0.5); }

        /* Gallery System */
        #gallery-view {
            position: fixed; inset: 0; background: black;
            transform: translateY(100%); transition: transform 0.3s ease;
            z-index: 100; display: flex; flex-direction: column;
        }
        #gallery-view.open { transform: translateY(0); }

        .gallery-nav { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        
        #grid-container {
            flex-grow: 1; display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 2px; overflow-y: auto;
        }
        .grid-item { position: relative; width: 100%; aspect-ratio: 1; }
        .grid-item img, .grid-item video { width: 100%; height: 100%; object-fit: cover; }
        
        .select-indicator {
            position: absolute; top: 5px; right: 5px;
            width: 20px; height: 20px; border: 2px solid white;
            border-radius: 50%; display: none;
        }
        body.selecting .select-indicator { display: block; }
        .grid-item.selected .select-indicator { background: var(--ios-blue); border-color: var(--ios-blue); }

        #photo-viewer {
            position: fixed; inset: 0; background: black; z-index: 200;
            display: none; align-items: center; justify-content: center;
        }
        #photo-viewer img, #photo-viewer video { max-width: 100%; max-height: 100%; }
    </style>
</head>
<body class="photo-active">

    <div class="top-bar">
        <div class="top-icon" onclick="location.reload()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M12 20c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-18C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2z"/></svg>
        </div>
        <div id="timer" style="display:none; color:white; font-weight:600; font-family: monospace;">00:00</div>
        <div class="top-icon" onclick="alert('Flash toggled')">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M7 2v11h3v9l7-12h-4l4-8z"/></svg>
        </div>
    </div>

    <div id="camera-wrapper">
        <video id="video" autoplay playsinline muted></video>
        <div class="portrait-overlay"></div>
        <div id="focus-square"></div>
    </div>

    <div class="bottom-ui">
        <div class="mode-container">
            <div class="mode-list">
                <span class="mode" id="m-video">VIDEO</span>
                <span class="mode active" id="m-photo">PHOTO</span>
                <span class="mode" id="m-portrait">PORTRAIT</span>
            </div>
        </div>

        <div class="shutter-row">
            <button class="thumb-link" onclick="toggleGallery(true)">
                <img id="latest-thumb" src="" style="display:none">
            </button>
            <div class="shutter-btn" id="shutter"><div class="shutter-inner"></div></div>
            <div class="thumb-link" style="display:flex; align-items:center; justify-content:center; background:#1c1c1e" onclick="flipCam()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M19 8l-4 4h3c0 3.31-2.69 6-6 6-1.01 0-1.97-.25-2.8-.7l-1.46 1.46C8.97 19.54 10.43 20 12 20c4.42 0 8-3.58 8-8h3l-4-4zM6 12c0-3.31 2.69-6 6-6 1.01 0 1.97.25 2.8.7l1.46-1.46C15.03 4.46 13.57 4 12 4c-4.42 0-8 3.58-8 8H1l4 4 4-4H6z"/></svg>
            </div>
        </div>
    </div>

    <div id="gallery-view">
        <div class="gallery-nav">
            <span style="color:var(--ios-yellow)" onclick="toggleGallery(false)">Done</span>
            <span id="gallery-title">Recents</span>
            <span id="btn-select" style="color:var(--ios-yellow)" onclick="toggleSelectMode()">Select</span>
        </div>
        <div id="grid-container"></div>
    </div>

    <div id="photo-viewer" onclick="this.style.display='none'">
        <div id="viewer-content"></div>
    </div>

    <canvas id="canvas" style="display:none"></canvas>

    <script>
        const video = document.getElementById('video');
        const shutter = document.getElementById('shutter');
        const latestThumb = document.getElementById('latest-thumb');
        const grid = document.getElementById('grid-container');
        
        let stream, recorder, chunks = [];
        let isFront = true, mode = 'photo', isRecording = false, isSelecting = false;
        let items = []; // Stores {url, type}

        // 1. Core Camera Engine
        async function initCamera() {
            if(stream) stream.getTracks().forEach(t => t.stop());
            
            // Critical: Only request 'audio' if in Video mode
            const constraints = {
                video: { facingMode: isFront ? "user" : "environment" },
                audio: (mode === 'video') 
            };

            try {
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                // Mute the video element so you don't hear feedback
                video.muted = true; 
                video.style.transform = isFront ? "scaleX(-1)" : "none";
            } catch (e) { console.error("Camera Init Failed", e); }
        }

        // 2. Mode Switching
        ['video', 'photo', 'portrait'].forEach(m => {
            document.getElementById('m-'+m).onclick = () => {
                mode = m;
                document.body.className = m + '-active';
                document.querySelectorAll('.mode').forEach(el => el.classList.remove('active'));
                document.getElementById('m-'+m).classList.add('active');
                initCamera(); // Restart camera to toggle mic
            };
        });

        // 3. Shutter Actions
        shutter.onclick = () => {
            if (mode === 'video') {
                isRecording ? stopRecording() : startRecording();
            } else {
                capturePhoto();
            }
        };

        function capturePhoto() {
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            if(isFront) { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
            
            // Add slight software blur for Portrait Mode
            if(mode === 'portrait') ctx.filter = 'contrast(1.1) brightness(1.05)';
            
            ctx.drawImage(video, 0, 0);
            const url = canvas.toDataURL('image/jpeg');
            items.unshift({url, type: 'image'});
            updateThumb(url);
            
            // Flash effect
            video.style.opacity = 0; setTimeout(()=>video.style.opacity=1, 50);
        }

        function startRecording() {
            isRecording = true;
            document.body.classList.add('recording');
            recorder = new MediaRecorder(stream);
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/mp4' });
                const url = URL.createObjectURL(blob);
                items.unshift({url, type: 'video'});
                updateThumb(url);
                chunks = [];
            };
            recorder.start();
        }

        function stopRecording() {
            isRecording = false;
            document.body.classList.remove('recording');
            recorder.stop();
        }

        function updateThumb(url) {
            latestThumb.src = url;
            latestThumb.style.display = 'block';
        }

        // 4. Gallery Logic
        function toggleGallery(show) {
            if(show) {
                renderGrid();
                document.getElementById('gallery-view').classList.add('open');
            } else {
                document.getElementById('gallery-view').classList.remove('open');
                isSelecting = false;
                document.body.classList.remove('selecting');
            }
        }

        function renderGrid() {
            grid.innerHTML = '';
            items.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'grid-item';
                div.innerHTML = item.type === 'image' 
                    ? `<img src="${item.url}">` 
                    : `<video src="${item.url}"></video>`;
                div.innerHTML += `<div class="select-indicator"></div>`;
                
                div.onclick = () => {
                    if(isSelecting) {
                        div.classList.toggle('selected');
                    } else {
                        openViewer(item);
                    }
                };
                grid.appendChild(div);
            });
        }

        function toggleSelectMode() {
            isSelecting = !isSelecting;
            document.body.classList.toggle('selecting');
            document.getElementById('btn-select').innerText = isSelecting ? "Cancel" : "Select";
        }

        function openViewer(item) {
            const container = document.getElementById('viewer-content');
            container.innerHTML = item.type === 'image' 
                ? `<img src="${item.url}">` 
                : `<video src="${item.url}" controls autoplay></video>`;
            document.getElementById('photo-viewer').style.display = 'flex';
        }

        function flipCam() { isFront = !isFront; initCamera(); }

        initCamera();
    </script>
</body>
</html>
